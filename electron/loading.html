<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionCare EMR — Loading</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #0a192f, #020c1b);
      color: #e6f1ff;
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .logo-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .eye-outer {
      width: 80px;
      height: 48px;
      border-radius: 50% 0;
      border: 4px solid #00b4d8;
      transform: rotate(45deg);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 20px rgba(0, 180, 216, 0.4);
      animation: pulse 2s infinite ease-in-out;
    }
    .eye-pupil {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle, #00f5d4, #00b4d8);
      box-shadow: 0 0 10px rgba(0, 245, 212, 0.8);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 {
      font-size: 14px;
      font-weight: 400;
      color: #8892b0;
      margin: 0 0 32px 0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .spinner-bar {
      width: 180px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .spinner-progress {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #00b4d8, #00f5d4);
      border-radius: 2px;
      position: absolute;
      animation: loading 1.5s infinite ease-in-out;
      box-shadow: 0 0 8px rgba(0, 245, 212, 0.6);
    }
    .status-text {
      font-size: 12px;
      color: #64ffda;
      margin-top: 12px;
      font-family: monospace;
      letter-spacing: 0.5px;
      opacity: 0.8;
    }
    @keyframes pulse {
      0%, 100% { transform: rotate(45deg) scale(1); opacity: 0.9; }
      50% { transform: rotate(45deg) scale(1.05); opacity: 1; box-shadow: 0 0 30px rgba(0, 180, 216, 0.6); }
    }
    @keyframes loading {
      0% { left: -40%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="eye-outer">
        <div class="eye-pupil"></div>
      </div>
    </div>
    <h1>VisionCare EMR</h1>
    <h2>Luna Eye Hospital</h2>
    <div class="spinner-bar">
      <div class="spinner-progress"></div>
    </div>
    <div class="status-text">Initializing system core...</div>
  </div>
</body>
</html>
